# Cinematic Display: Intro
Cinematic_Intro_1 = Hund! Du wirst nie mehr Lassics wege kreuzen!
Cinematic_Intro_2 = Merk' dir die Lektion!
Cinematic_Intro_3 = Nero! Ist dir...? Nein! Stirb nicht!
Cinematic_Intro_4 = Alis, Hoere! Lassic wird unsere Welt vernichten. Ich wollte seinen Plan entdecken, doch alleine gelingt das nie.
Cinematic_Intro_5 = Da ist ein Mann namens "Odin" - vielleicht gelingt es euch, Lassic aufzuhalten. Alis, es ist zu spät für mich. Sei...
Cinematic_Intro_6 = Ich schwöre, mein Bruder ist nicht umsonst gestorben. Achte auf mich, Nero.

# Camineet
Camineet_House_Alis = Hier ist Alis' zuhause.
Camineet_House_Nekise_intro = Ich bin Nekise. Man hoert geschichten - man sagt, dass ein mann namens Odin in der Stadt  Scion lebt. Und von Nero habe ich den Laconia Topf hier erhalten. Er kann euch bestimmt helfen.
Camineet_House_Nekise_greet = Mehr kann ich nicht tun - kommt gesund wieder.
Camineet_House_Man = Sie benötigen einen Kerker Schlüssel für verschlossene Türen zu öffnen.
Camineet_House_Suelo_intro1 = Ich bin Suelo.
Camineet_House_Suelo_intro2 = Und weiss wie ihr euch fuehlt. Niemand kann euch von eurem weg abhalten.
Camineet_House_Suelo_intro3 = Solltet ihr je verwundet werden, kommt zu mir.
Camineet_House_Suelo_greet = Bitte, ihr seid hier willkommen. Ruht euch aus.
Camineet_House_Oldman = Kennt ihr die Planeten des Algol Systems?
Camineet_House_Oldman_Yes = O.K. Bis dann.
Camineet_House_Oldman_No = Es sind Palma, Motavia und Dezoris. Palma ist eine gruene welt, Motavia eine aus sand und Dezoris eine aus eis.
Camineet_House_Oldman_NoCrisis = Zur zeit steht eine grosse krise bevor.
Camineet_People_Ent1 = Ohne ein Licht kommt Ihr in verliesen nicht weit gehen.
Camineet_People_Ent2 = Ein Raumhafen ist im westen von Camineet.
Camineet_People_Ent3 = Wollt ihr einen guten Fang machen, so geht zur Hafenstadt.
Camineet_People_Ent4 = Camineets lebens bezirke sind abgeriegelt.
Camineet_People_Cop1 = Bleibt hier, wenn ihr nicht sterben wollt!
Camineet_People_Cop2 = Verlasst ja nie unsere lebens bezirke!
Camineet_People_Cop_No_Pass = Nur mit einem Ausweis.
Camineet_People_Cop_Pass = Sie kann fortfahren.

# Parolit
Parolit_House_1 = Hier sind Parolits lebens bezirke.
Parolit_House_2 = Der Wald ist voller gefahren.
Parolit_House_3 = Medusa lebt erneut und ist in einer Höhle im Süden. Wer sie je ansah, wurde zu Stein.
Parolit_People_Ent1 = Vom Raumhafen geht's nach Paseo auf Motavia.
Parolit_People_Ent2 = Eine unterirdische Passage westlich von hier führt zur Gothic Wald.
Parolit_People_Ent3 = Im Osten ist eine Hafenstadt namens Scion.
Parolit_People_Cop1 = Bleibt hier, wenn ihr nicht sterben wollt!
Parolit_People_Cop2 = Verlasst ja nie unsere lebens bezirke!
Parolit_People_Cop_No_Pass = Nur mit einen Ausweis.
Parolit_People_Cop_Pass = Sie kann fortfahren.

# Scion
Scion_House_1 = Wenn ihr nach Norden geht, findet ihr einen Hügel namens Baya Marlay, aber ihr werdet nicht zu ihm gelangen können.
Scion_House_2 = Eine magisch versiegelte Tür lässt sich nur mit einem eigenen Zauber öffnen.
Scion_House_3 = Auf Motavia und Dezoris leben intelligente Wesen. Leben auf einem anderen Planeten! Könnt ihr euch das vorstellen?
Scion_House_4_PreMyau = Ja, Tylon war hier. Er sagte etwas davon, nach Süden zu ziehen, um Medusa zu erschlagen. Er hatte ein seltsames, sprechendes Tier bei sich! Es trug ein Fläschchen Medizin um den Hals. Was das wohl war?
Scion_House_4_AfterMyau = Es wurde Zeit, dass sich jemand LaShiec entgegenstellt. Gott sei mit euch.
Scion_House_5 = Nur ein Narr würde ohne Kompass in den Eppi-Wald gehen.
Scion_House_6_PreMyau = Das klingt verrückt, aber ich habe in Medusas Verlies ein sprechendes Tier gefunden. Ich habe es an einen Händler in Paseo verkauft. Der kleine Kerl war ein Vermögen wert!
Scion_House_6_AfterMyau = Seit LaShiec an der Macht ist, liegt die Wirtschaft am Boden. Ich bin so pleite, ich weiß nicht mehr weiter...
Scion_House_7 = Die Iala-Höhle liegt auf der Halbinsel südlich der Stadt.
Scion_People_Ent1 = Willkommen in Shion. Früher blühte hier der Handel, bis LaShiecs Embargo kam. Jetzt suchen die meisten von uns verzweifelt nach Arbeit.
Scion_People_Ent2 = Früher bin ich in der Naula-Höhle an der Küste nördlich von Baya Marlay auf Erkundung gegangen. Aber bei all den Monstern, die plötzlich auftauchen, würde ich es nicht einmal mehr versuchen.
Scion_Second_Hand_Shop_Secret1 = Ich weiß nicht, wovon ihr redet. Ich führe hier ein ehrliches Geschäft.
Scion_Second_Hand_Shop_Secret2 = Ich habe es euch schon einmal gesagt: Ich handle nicht mit illegaler Ware. Raus aus meinem Laden.
Scion_Second_Hand_Shop_Secret3 = Ihr gebt wohl nie auf, was? Hier, nehmt schon. Ein Straßenpass, unterschrieben und beglaubigt. Wenn euch jemand nach zwei toten Kurieren fragt: Ihr wisst von nichts.

# Spaceport
Spaceport_People_Ent1 = Willkommen am Raumhafen von Palma. Von hier aus könnt ihr nach Paseo auf Motavia reisen.
Spaceport_People_Ent2 = Diese Schiffe fliegen nach Paseo, die Hauptstadt Motavias. Dort lebt der Gouverneur.
Spaceport_People_Ent3 = Bevor die Raumfahrt kommerziell wurde, baute man Raumschiffe in einem Forschungslabor in Gothic.
Spaceport_People_Cop = Habt ihr einen Pass?
Spaceport_People_Cop_YesLie = Haltet mich nicht zum Narren!
Spaceport_People_Cop_Yes = Ihr dürft passieren.
Spaceport_People_Cop_No = Ihr dürft nicht passieren.
Spaceport_Passport_Intro = Seid ihr hier, um einen Pass zu beantragen?
Spaceport_Passport_No = Nun gut. Der Nächste, bitte!
Spaceport_Passport_Yes = Das Gesetz verlangt, dass ich euch einige Fragen stelle. Wurdet ihr je wegen eines Verbrechens verurteilt?
Spaceport_Passport_IllegalYes = Tut mir leid, ihr seid nicht berechtigt. Der Nächste!
Spaceport_Passport_IllegalNo = Leidet ihr an einer Krankheit, die sich durch Reisen verschlimmern könnte?
Spaceport_Passport_IllnessNo = Es fällt eine Bearbeitungsgebühr von 100 Mesetas an. Könnt ihr zahlen?
Spaceport_Passport_IllnessYes = Tut mir leid, ihr seid nicht berechtigt. Der Nächste!
Spaceport_Passport_PayNo = Nun gut. Der Nächste, bitte!
Spaceport_Passport_PayYes = In Ordnung, ich stelle euch einen Pass aus. Bitte sehr. Der Nächste!
Spaceport_Passport_PayNoMesetas = Ihr habt nicht genug Geld. Kommt später wieder.
Spaceport_Shuttle = Dies ist ein Direktflug nach Motavia. Steigt ihr ein?

Spaceport_People_Cop_Closed = Zutritt verweigert. Raumreisen sind für alle Bürger vollständig gesperrt. Dies ist eine Frage der nationalen Sicherheit.
Spaceport_People_Cop_TakePassport = Wir müssen euren Pass jetzt beschlagnahmen.


# Paseo Spaceport
Paseo_Spaceport_Ent1 = Dies ist der Raumhafen von Paseo, der einzige auf Motavia.
Paseo_Spaceport_Ent2 = Es ist Brutzeit der Ameisenlöwen, seid da draußen vorsichtig.
Paseo_Spaceport_Ent3 = Ich habe gehört, in der Naula-Höhle auf Palma gibt es einen Kuchenladen. Ob der in so einer Höhle überhaupt Kundschaft hat?
Paseo_Spaceport_Shuttle = Dieses Shuttle fliegt nach Palma. Steigt ihr ein?

# Paseo
Paseo_House_1 = Dies ist Paseo, die Hauptstadt Motavias.
Paseo_House_2 = Ameisenlöwen kann man zu Fuß nicht überqueren.
Paseo_House_3 = Der Gouverneur liebt Süßes.
Paseo_People_Ent1 = Die Höhle Mahal liegt in den Bergen nördlich von Paseo.
Paseo_People_Ent2 = Es gibt intelligente Monster, aber sie sprechen eine andere Sprache als wir. Man müsste schon ein Magier sein, um sie zu verstehen.
Paseo_People_Ent3 = Um den Gouverneur zu treffen, muss man ein Geschenk überreichen.
Paseo_People_Ent4 = Selbst der Gouverneur steht mit LaShiec auf schlechtem Fuß.
Paseo_People_Cop_Exit = Ihr solltet das Wohngebiet besser nicht verlassen.
Paseo_People_Cop_Passage = zzz...
Paseo_Shop_Myau = Schon mal eine sprechende Katze gesehen? Selten. Wirklich selten. Ein Einzelstück, wenn ich mich nicht irre. Eine Million Mesetas, und sie gehört euch. Na, wie wär's?
Paseo_Shop_MyauYes = Ihr habt nicht genug Mesetas!
Paseo_Shop_MyauNo = Schade. ...Moment mal. Ist das ein Laconia-Topf? Wie wäre ein Tausch: der Topf gegen das Kätzchen?
Paseo_Shop_MyauTradeYes = Es tut mir weh, den Kleinen gehen zu sehen, aber so einen Tausch kann ich nicht ablehnen. Passt gut auf ihn auf.
Paseo_Shop_MyauTradeNo = Was, wirklich? He, wo wollt ihr hin?
Paseo_Shop_MyauAfter = Ich habe mit dem Laconia-Topf ein Vermögen gemacht! Danke!
Paseo_People_Cop_No_Pass = Tut mir leid, höchste Sicherheitsstufe. Für den Zugang zum Raumhafen ist ein unterschriebener Straßenpass nötig. Zutritt verweigert.
Paseo_People_Cop_Pass = Zutritt gewährt. Geht durch.

Paseo_Passageway_Cop = Halt! Habt ihr ein Geschenk für den Gouverneur dabei?
Paseo_Passageway_Cop_NoGiftYes = Das sind keine angemessenen Geschenke!
Paseo_Passageway_Cop_NoGiftNo = Ohne Geschenk kann ich euch keinen Zutritt gewähren!
Paseo_Passageway_Cop_Gift = Ah, Torte. Er wird sich freuen. Ich bewahre sie für euch auf. Geht weiter.
Paseo_Governor_RestHouseBefore = Ihr seht müde aus. Warum ruht ihr euch nicht eine Weile aus?
Paseo_Governor_RestHouseAfter = Viel Glück da draußen. Ihr werdet es brauchen.
Paseo_Governor_Intro = Ihr habt vor, LaShiec zu stürzen, nicht wahr? LaShiec ist ein mächtiger Mann. Nein, mehr als ein Mann. Er steht über diesen Grenzen. Er ist etwas völlig anderes. Es ist sehr mutig, dass ihr euch ihm stellt. Aber Mut allein, fürchte ich, wird nicht genügen. Doch in euch schlummert etwas, etwas sehr Mächtiges. Es ist eine Kraft, die ihr selbst entdecken müsst. Mehr kann ich euch nicht sagen. Noch nicht. Geht. Vernichtet ihn. Ich werde euch nicht aufhalten. Ich biete euch sogar Hilfe an. Ein mächtiger Esper namens Lutz lebt in der Mahal-Höhle nördlich von hier. Bringt ihm diesen Brief. Er wird verstehen. Kehrt hierher zurück, wenn ihr LaShiec besiegt habt. Ich glaube an euch.
Paseo_Governor_Rest = Ihr müsst müde von eurer Reise sein. Warum ruht ihr euch nicht eine Weile aus?
Paseo_Governor_Dream = Ihr seid in einen tiefen Schlaf gefallen...
Paseo_Governor_BadDream = Es war alles nur ein Traum...
Paseo_Governor_Return = Es ist keine Zeit zu verlieren. Seid bitte vorsichtig. Ich bete für eure Sicherheit.
Paseo_Governor_Greet = Kehrt hierher zurück, wenn ihr LaShiec besiegt habt. Gott sei mit euch.
Paseo_Governor_Greet_BeforeLutz = Da die Anweisung vom Gouverneur stammt, wird Lutz wohl zuhören.


# Paseo/End
Paseo_Mansion_Darkfalz = Leer! Wo ist der Gouverneur?
Paseo_Governor_Darkfalz_Dead = Na, so was. Seid ihr tot? Wie schade. Kehrt zurück und versucht es erneut.
Paseo_Governor_Darkfalz = Oh, du meine Güte. Mein Geist und mein Körper waren... von einer bösen Macht besessen. Ein Wunder, dass ich noch lebe. Danke. Ihr habt es geschafft. Ihr habt Algol gerettet. Die Geschichte wird eure Namen für immer weitertragen.
Paseo_Governor_End = Alisa. Ich muss euch etwas sagen. Es ist ein Geheimnis, das ich verschwiegen habe, um euer Leben zu schützen. Jetzt, da LaShiec fort ist, kann ich es aussprechen. Alisa... euer Vater war der König von Algol. Sein königliches Blut fließt in euch. Es hat euch Stärke verliehen. Wir sind ohne Herrscher, Alisa. Wollt ihr eurem Vater nachfolgen und Algols Königin werden?
Paseo_Governor_EndYes = Gut! Ihr seid nun die Königin von Algol.
Paseo_Governor_EndNo = Nein? Auch gut, wenn ihr es so wünscht. Ihr werdet hier immer willkommen sein.
Paseo_Governor_EndOk = Euer Vater war der beste König, den Algol je hatte. Und mehr noch: Er war ein guter Mensch. Er wäre heute stolz auf euch.


# Cinematic Display: Myau
Cinematic_Myau_1 = Ich schätze, wir sind jetzt Gefährten, was? Ich bin Alisa. Wie heißt du?
Cinematic_Myau_2 = Myau.
Cinematic_Myau_3 = Hallo, Myau. Ich suche einen Mann namens Tylon. Gerüchten zufolge reiste er mit einem sprechenden Tier. Das warst nicht zufällig du?
Cinematic_Myau_4 = Tylon wurde zu Stein, als er Medusa erschlagen wollte! Mit dieser Medizin können wir ihn heilen, aber ich bekomme den Deckel nicht auf. Er müsste noch in der Höhle südlich von Camineet sein. Weißt du, wie man dorthin kommt?
Cinematic_Myau_5 = Ich denke schon. Komm, helfen wir ihm.

# Odin in Stone
Odin_Stone = Es sieht aus, als wäre dieser Mensch zu Stein erstarrt. Ob das Tylon ist?
Odin_Item_Alsulin = Alisa öffnete den Deckel des Fläschchens und goss den Inhalt aus.
Odin_Item_Myau = Aber Myau konnte den Deckel des Fläschchens nicht öffnen.

# Cinematic Display: Odin
Cinematic_Odin_1 = Ah, Myau, du hast Hilfe gefunden. Danke. Medusa war stärker, als ich dachte. Gegen LaShiec habe ich keine Chance. Wer ist deine neue Freundin?
Cinematic_Odin_2 = Ich heiße Alisa. Mein Bruder Nero wurde ermordet, als er LaShiec stürzen wollte. Ich werde ihn töten. Nero nannte mir deinen Namen, kurz bevor er starb. Er sagte, du würdest helfen.
Cinematic_Odin_3 = Verstehe. Nun, ich kann ein Mädchen wie dich doch nicht allein ziehen lassen, oder?
Cinematic_Odin_4 = Danke für die Sorge, aber ich kann auf mich selbst aufpassen. Warum hast du Medusa gejagt?
Cinematic_Odin_5 = Medusa besitzt eine legendäre Axt. Ich hoffte, LaShiecs Blut auf ihr zu sehen. Ich habe einen Kompass in einer Sackgasse in dieser Höhle versteckt. Wir werden ihn brauchen. Gehen wir.

# Eppi
Eppi_People_Ent1 = Willkommen im Dorf Eppi! Wir bekommen kaum noch Besuch, seit der Wald von Monstern wimmelt.
Eppi_House_1 = Es würde mich nicht wundern, wenn der Gouverneur von Motavia gutheißen würde, was ihr tut.
Eppi_House_2 = Alle großen Esper leben auf Motavia.
Eppi_House_3 = Wisst ihr, was das härteste, stärkste Material der Welt ist?
Eppi_House_3_Yes = O.K. Schönen Tag noch.
Eppi_House_3_No = Es ist Laconia! Laconia-Waffen sind die stärksten überhaupt!
Eppi_House_4 = Vor langer Zeit hatte ein Professor namens Luveno ein Forschungslabor im Gothic-Wald. Ob es wohl noch steht?
Eppi_House_Key = Ihr legt euch also mit dem alten LaShiec an? Entweder seid ihr Narren, oder ihr seid zäher, als ihr ausseht. Wie auch immer, ich bewundere euren Mut. Braucht ihr einen Kerkerschlüssel?
Eppi_House_KeyNo = Viel Glück.
Eppi_House_KeyYes = Ich habe einen im Lagerhaus am Rande von Camineets Wohngebiet versteckt. Er gehört euch.
Eppi_House_Key_Return = Ihr werdet jede Hilfe brauchen, um LaShiec zu besiegen.

# Naula Cave
Naula_CakeShop = He, willkommen, schön, dass ihr es geschafft habt. Entschuldigt die Lage. Bei all den Steuererhöhungen war das alles, was ich mir leisten konnte. Ihr wisst ja, wie das ist. Meine weltberühmten Torten kosten 280 Mesetas. Möchtet ihr eine?
Naula_CakeShopNo = Nun, kommt bald wieder.
Naula_CakeShopYes = Danke! Kommt wieder!

# Iala Cave
Iala_Man = Ich habe viele Männer in die innere Kammer gehen sehen. Herauskommen ist allerdings eine andere Geschichte. Ich habe nie jemanden lebend herauskommen sehen.

# Maharu Cave
Maharu_Noah_NoLetter = Wer seid ihr? Ich versuche zu trainieren. Stört mich nicht.

Cinematic_Noah_1 = Ihr müsst Lutz sein. Ich habe einen Brief des Gouverneurs für euch. Würdet ihr ihn lesen?
Cinematic_Noah_2 = Zeigt her. ...Ah. Ich verstehe. So weit ist es also gekommen. Verzeiht meine anfängliche Feindseligkeit. LaShiec ist ein gefährlicher Mann. Um Algols willen muss er aufgehalten werden. Ich denke, ich kann helfen. Wir müssen Dr. Luveno im Gothic-Wald warnen. Wenn ich mich recht erinnere, gelangt man durch einen Schacht an der Raumstation von Camineet dorthin. Gehen wir. Schnell.

# Manhole Passage
Spaceport_Passage_Assistant = Lenkt mich nicht ab! Ich bin sehr beschäftigt.
Spaceport_Passage_Assistant_pos_Luveno = Was? Ihr habt den Doktor befreit? Was?! Er baut euch ein Raumschiff?! Dafür ist er zu alt. Ich gehe ihm besser helfen.

# Gothic
Gothic_People_Ent1 = Ich könnte wirklich eine PelorieMate gebrauchen. Habt ihr eine übrig?
Gothic_People_Ent1No = Dann helfe ich auch nicht. Verschwindet.
Gothic_People_Ent1Yes = Danke. Ihr sucht wohl Doktor Luveno. Ja, sein Labor war früher hier. Jetzt nicht mehr. Sie haben den Spinner endlich eingesperrt. Er sitzt in Triada, einem Gefängnis südlich von hier.
Gothic_People_EntNotEnoughCola = Sehe ich aus wie ein Idiot?!
Gothic_People_Ent2 = Ich könnte wirklich eine PelorieMate gebrauchen. Habt ihr eine übrig?
Gothic_People_Ent2No = Dann helfe ich auch nicht. Verschwindet.
Gothic_People_Ent2Yes = Danke, Fremde. Am Ende des Pfades in die Berge steht ein uralter Turm. Man munkelt, die alte Medusa verstecke sich dort. Wenn ihr keine Statue werden wollt, bleibt lieber fern.
Gothic_People_Ent3 = He! Weg von meinem Revier!
Gothic_People_Ent3_hapsby = Ich schätze, ich muss tun, was Dr. Luveno sagt. Geht durch.
Gothic_House_Luveno = Seid gegrüßt. Warum hat das so lange gedauert? Fangen wir an. Holt zuerst meinen Assistenten. Er versteckt sich vermutlich im unterirdischen Gang. Ein wenig paranoid, der Gute.
Gothic_House_Luveno_pos_Assistant = Gut. Mein Personal wäre versammelt. Was, ihr glaubt nicht, dass zwei Leute ein Raumschiff bauen können? Ich baue diese Dinger, seit ihr in den Windeln lagt! Also: Ein Raumschiff kauft man nicht wie eine PelorieMate. Das ist eine ernsthafte Investition, und sie kostet ernsthaftes Geld. Ich verlange 1200 Mesetas im Voraus. Könnt ihr das aufbringen?
Gothic_House_Luveno_fee_No = Wenn ihr nicht tut, was ich sage, kann ich euch unmöglich helfen.
Gothic_House_Luveno_fee_Yes = Prächtig. Wir beginnen sofort mit dem Bau. Das wird etwas dauern, ich bin eingerostet. Geht doch ein paar Schleime erschlagen, oder was auch immer ihr so treibt.
Gothic_House_Luveno_fee_NotEnough = Ihr habt nicht genug? Dann besorgt mehr!
Gothic_House_Luveno_work1 = Bitte, Perfektion lässt sich nicht drängen.
