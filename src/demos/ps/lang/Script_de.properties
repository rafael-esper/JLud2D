Monster_Dialogue_6 = Hütet euch in den Verliesen vor Fallgruben.
Monster_Dialogue_7 = Wer Schatztruhen unachtsam öffnet, verletzt sich.
Monster_Dialogue_8 = Ihr verdammten Diebe!
Monster_Dialogue_9 = Die Leute hassen uns, egal was wir tun.
Monster_Tele_1 = Die Sanftmut-Flöte klingt so schön!
Monster_Tele_2 = IceDecker können Eis durchschneiden!
Monster_Tele_3 = Lord LaShiec lebt oben im Himmel.
Monster_Tele_4 = Der Irre Doktor in Avion hat einen Laconia-Topf.
Monster_Tele_5 = Es gibt Orte am Himmel, die selbst ein Raumschiff nicht erreicht.
Monster_Tele_6 = Ihr braucht einen bestimmten Gegenstand, damit Laerma-Beeren wachsen.
Monster_Tele_7 = Manche Verlies-Labyrinthe enthalten versteckte Türen.
Monster_Tele_8 = Der Wunderschlüssel kann magische Türen öffnen!
Monster_Tele_9 = Manche Dezorianer sind Lügner, also Vorsicht.
Monster_Tele_10 = Mutig, dass ihr mit mir sprecht. Haltet durch.


