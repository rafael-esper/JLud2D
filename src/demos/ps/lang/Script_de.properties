# Start as Odin

Cinematic_Intro_Odin_1 = Palma, der erste Planet des Sternsystems Algol, hat unter seinem König LaShiec den Gipfel seines Wohlstands erreicht. Doch im Frühjahr dieses Jahres begannen grauenhafte Gerüchte die Runde zu machen.
Cinematic_Intro_Odin_2 = König LaShiec sei einer seltsamen Religion verfallen und habe Algol im Tausch gegen das ewige Leben verkauft.
Cinematic_Intro_Odin_3 = Die Gerüchte haben sich als wahr erwiesen. Groteske Kreaturen sind in jeden Winkel jedes Planeten von Algol vorgedrungen und bedrohen das Leben der Menschen. Etwas Furchtbares bahnt sich an...
Cinematic_Intro_Odin_4 = Du bist Tylon, der Krieger. Du bist aufgebrochen, um LaShiec zu stürzen.

Camineet_House_Alis_Odin = Mein älterer Bruder arbeitet am Raumhafen. Aber ich glaube, er verheimlicht mir etwas.
Camineet_House_Nekise_Odin = Mit Pistolen kannst du mehrere Gegner gleichzeitig treffen.
Camineet_House_Suelo_Odin = Es sind harte Zeiten. Solltest du je im Kampf verwundet werden, geh in ein Krankenhaus in Parolit oder Shion.

Eppi_House_Key_Myau = Tylon, mein Junge. Du wirst Hilfe brauchen, wenn du uns vor LaShiec retten willst. Ich habe hier ein Geschöpf, das sich deiner Suche anschließen möchte.

Cinematic_Myau_Odin1 = Ich heiße Myau. Freut mich, dich kennenzulernen.
Cinematic_Myau_Odin2 = LaShiec führt unsere Welt ins Verderben. Wir müssen ihn aufhalten.
Cinematic_Myau_Odin3 = Er ist stark, und Gerüchte sagen, er besitze magische Kräfte. Wie soll man ihn herausfordern?
Cinematic_Myau_Odin4 = Ich habe gehört, Medusa besitzt eine mystische Axt. Mit dieser Waffe hätte ich vielleicht eine Chance gegen LaShiec. Suchen wir sie gemeinsam.

Odin_Cave_Hiss = Ihr hörtet ein Zischen durch die Höhle hallen. Vielleicht ist es Medusa?
Odin_Cave_Compass = Myau, der Kompass macht ein seltsames Geräusch. Ich verstecke ihn hier, um Medusa anzulocken.
Odin_Cave_Medusa = Es ist Medusa!
Odin_Cave_Stone = Tylon wurde zu Stein. Myau entkommt.
Odin_Cave_Alis_Help = Viel Zeit vergeht... Eine lange, lange Zeit, die Tylon wie eine Ewigkeit erscheint... Plötzlich erscheint ein Mädchen mit Myau.

# Start as Noah
Name_Tajim = Tajima
Name_Brio = Brio

Noah_Tajim_Intro = König LaShiec führt unsere Welt in eine beispiellose Krise. Einer seiner Handlanger, der blaue Zauberer, quält das Volk der Motavianer. Er ist in der Maharu-Höhle nördlich von Paseo zu finden.
Noah_Tajim_Mission = Lutz, mein Schüler, als Teil deiner Ausbildung musst du den blauen Zauberer besiegen. Bereite dich vor, und wenn du soweit bist, geh zur Höhle und halte ihn auf. Ich gebe dir einen Kerkerschlüssel, er kann dir auf deiner Suche nützlich sein.

Noah_Paseo_Shop_Shortcake = Ich verkaufe Torten für 280 Mesetas. Möchtet ihr eine?
Noah_Paseo_Shop_ShortcakeNo = Nun, kommt bald wieder.
Noah_Paseo_Shop_ShortcakeYes = Danke! Kommt wieder!

Noah_Paseo_Governor_Intro = Willkommen in meinem Amtssitz. Es ist immer eine Freude, jemanden so Angesehenen zu empfangen.
Noah_Paseo_Governor_Quest = Der blaue Zauberer bereitet uns Schwierigkeiten. Mehrere Motavianer-Clans bekämpfen einander wegen seines Einflusses. Ich schreibe einen Brief, mit dem du belegen kannst, dass deine Mission meine volle Unterstützung hat.
Noah_Paseo_Governor_Return = Es ist keine Zeit zu verlieren. Sei bitte vorsichtig. Ich bete für deine Sicherheit.

Noah_Motavia_Brio_Halt = Halt! Niemand passiert, wir halten diese Blockade Tag und Nacht. Das Gebiet des blauen Zauberers darf nicht betreten werden.
Noah_Motavia_Brio_Letter = Ihr habt einen Brief des Gouverneurs? Zeigt her. Verstehe, ihr wollt den blauen Zauberer besiegen und all das Böse ungeschehen machen, das er verbreitet hat.
Noah_Motavia_Brio_Join = Ich denke, ich sollte euch passieren lassen. Mehr noch: Ich will mich eurer Sache anschließen und helfen. Ich heiße Brio, und ich kenne den Weg zur Maharu-Höhle. Los geht's!

Noah_Blue_Wizard_with_Lutz = Ein Esper -- ihr widersetzt euch mir? Das werdet ihr bereuen.
Noah_Blue_Wizard_without_Lutz = Wer seid ihr? Verschwindet, hier gibt es nichts für euch zu tun.

Noah_Ending_Peace = Der blaue Zauberer wurde besiegt. Die Motavianer-Clans leben nun in Frieden. Doch solange König LaShiec herrscht: Wie lange wird das halten?
Noah_Ending_Training = Dies ist ein guter Ort, um mein Training fortzusetzen. Meine Kraft muss wachsen, um den kommenden Prüfungen zu begegnen.


# Tonoe
Tonoe_House_1 = Ich habe gehört, auf Palma gibt es Städte voller Schrott. Stimmt das?
Tonoe_House_1Yes = Bartevo? Da würde ich gerne mal hin.
Tonoe_House_1No = Ich mag Schrott wirklich gern.
Tonoe_House_2 = Meister Tajima lebt in einer Höhle nahe dem See. Aber darin hausen magische Monster, also seid vorsichtig.
Tonoe_House_3 = Meine Tochter ist verschwunden! Bitte helft mir, sie zu finden. Sie wurde zuletzt bei der Höhle östlich von hier gesehen.
Tonoe_House_3_Rescue = Vielen Dank, dass ihr meine Tochter gefunden habt! Ihr könnt euch jederzeit in meinem Haus ausruhen.
Tonoe_House_4 = Die Höhle östlich von hier heißt Blaubeeren-Mine. Früher haben wir dort Titan abgebaut, aber jetzt ist sie voller Monster.
Tonoe_House_5 = Wir verkaufen Alsulin im Laden. Manche Monster in Algol können ihre Opfer versteinern, wie Basilisken. Mit dieser Medizin macht ihr sie wieder normal.
Tonoe_House_Chief = Ich bin Fryz, das Oberhaupt dieses Dorfes. Es gibt fünf Clans von Motavianern auf dem Planeten. Aber Tonoe ist eine sehr weltoffene Stadt und heißt alle Clans gleichermaßen willkommen. Sogar Palmaner, außer diesem Schurken von König, den ihr da habt.
Tonoe_People_Ent1 = Dies ist das Motavianer-Dorf Tonoe.
Tonoe_People_Ent2 = Motavianer leben gern in verborgenen Städten, fern von fremden Blicken.
Tonoe_People_Ent3 = In der Wüste treiben sich motavianische Banditen herum. Es sind harte Zeiten.
Tonoe_People_Rescue = Danke für die Rettung! Ich gehe jetzt nach Hause.
Tonoe_Mines_Necro_Esper = Wir Nekromanten erforschen die Untoten. Ihr solltet meinen Meister besuchen, er versteckt sich in einem verfallenen Haus in Gothic.

# Gothic: new
Gothic_Necro_Palman = Ich bin ein Nekromant. Sucht ihr das Ende des Untoten-Fluchs über Algol?
Gothic_Necro_Palman_Yes = Bald werden wir gemeinsam daran arbeiten können. Wartet nur.
Gothic_Necro_Palman_No = Eines Tages wird jemand den Mut dazu haben.
