<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>JLud2D - Phaser 4 Port</title>
    <link rel="icon" type="image/x-icon" href="data:image/x-icon;base64,AAABAAEAEBAAAAEAIABoBAAAFgAAACgAAAAQAAAAIAAAAAEAIAAAAAAAAAQAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA">
    <style>
        html, body {
            height:100%; margin:0; background:#111; color:#eee;
            font-family:system-ui,Segoe UI,Roboto,Helvetica,Arial;
            -webkit-user-select:none; user-select:none;
            -ms-touch-action:none; touch-action:none;
        }
        #game-container {
            width:100%; height:100%; overflow:hidden; position:relative;
        }
        canvas {
            image-rendering: pixelated;
            image-rendering: -moz-crisp-edges;
            image-rendering: crisp-edges;
        }

        /* On-screen controls (outside Phaser canvas) */
        .control-button {
            position: fixed;
            width:64px; height:64px;
            border-radius:12px;
            background: rgba(255,255,255,0.06);
            display:flex; align-items:center; justify-content:center;
            color:#fff; font-weight:700; font-size:18px;
            backdrop-filter: blur(4px);
            -webkit-tap-highlight-color: transparent;
            box-shadow: 0 6px 16px rgba(0,0,0,0.6);
            user-select:none;
            border: none;
            cursor: pointer;
        }
        .control-button:active { transform: translateY(2px); opacity:0.9; }

        /* Button positions - fixed CSS positioning */
        #btn-b1 { right:182px; bottom:18px; }  /* Bottom row, left */
        #btn-b2 { right:100px; bottom:18px; }  /* Bottom row, center */
        #btn-b3 { right:18px; bottom:18px; }   /* Bottom row, right */
        #btn-b4 { right:182px; bottom:88px; }  /* Top row, left */
        #btn-b5 { right:100px; bottom:88px; }  /* Top row, center */
        #btn-b6 { right:18px; bottom:88px; }   /* Top row, right */
        #btn-pause { right:100px; bottom:158px; width:44px; height:32px; border-radius:8px; font-size:12px; }
        #btn-start { right:18px; bottom:158px; width:44px; height:32px; border-radius:8px; font-size:12px; }
        #btn-toggle-controls { left:18px; top:18px; width:42px; height:42px; border-radius:10px; font-size:12px; }
        #btn-show-controls { right:18px; bottom:18px; width:36px; height:36px; border-radius:8px; font-size:16px; background: rgba(0,0,0,0.7); opacity: 0; transition: opacity 0.3s ease; z-index: 1000; }

        /* Joystick area - fixed CSS positioning */
        #joy-area {
            position:fixed; left:18px; bottom:18px;
            width:30vmin; height:30vmin; max-width:200px; max-height:200px;
            touch-action:none;
        }

        /* Instructions */
        #instructions {
            position:absolute; left:50%; transform:translateX(-50%); bottom:8px;
            background:rgba(0,0,0,0.35); color:#ddd; padding:6px 10px; border-radius:8px; font-size:13px;
            z-index: 10;
        }

        /* Hidden controls class */
        .controls-hidden {
            display: none !important;
        }

        /* Hide all mobile controls by default */
        .control-button:not(#btn-toggle-controls):not(#btn-show-controls),
        #joy-area {
            display: none;
        }

        #loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: white;
            text-align: center;
            z-index: 100;
        }

        .hidden {
            display: none;
        }
    </style>
</head>
<body>
    <div id="loading">
        <h2>JLud2D - Phaser 4 Port</h2>
        <p>Loading configuration...</p>
    </div>

    <div id="game-container"></div>

    <!-- Mobile Controls -->
    <div id="joy-area" aria-hidden="true"></div>
    <button id="btn-b1" class="control-button" aria-label="B1">B1</button>
    <button id="btn-b2" class="control-button" aria-label="B2">B2</button>
    <button id="btn-b3" class="control-button" aria-label="B3">B3</button>
    <button id="btn-b4" class="control-button" aria-label="B4">B4</button>
    <button id="btn-b5" class="control-button" aria-label="B5">B5</button>
    <button id="btn-b6" class="control-button" aria-label="B6">B6</button>
    <button id="btn-pause" class="control-button" aria-label="Pause">Pause</button>
    <button id="btn-start" class="control-button" aria-label="Start">Start</button>
    <button id="btn-toggle-controls" class="control-button" aria-label="Toggle Controls">⚙</button>
    <button id="btn-show-controls" class="control-button" aria-label="Show Mobile Controls">🎮</button>

    <!-- Phaser 3.80 (using CDN for now) -->
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.80.0/dist/phaser.min.js"></script>

    <!-- VGM Core Libraries loaded dynamically by VGM module -->

    <!-- Game scripts -->
    <script type="module" src="src/main.ts"></script>

    <script>
        // Mobile Controls Manager
        class MobileControlsManager {
            constructor() {
                this.isTouch = ('ontouchstart' in window) || navigator.maxTouchPoints > 0;
                this.controlsVisible = false; // Start hidden by default
                this.showButtonVisible = false; // Show button starts hidden
                this.showButtonTimer = null; // Timer for auto-hide
                this.buttonStates = {
                    b1: false, b2: false, b3: false, b4: false, b5: false, b6: false, start: false, pause: false
                };
                this.joystickState = { active: false, dx: 0, dy: 0 };
                this.activeButtons = ['b1', 'b2']; // Default: most demos use 2 buttons
                this.init();
            }

            init() {
                this.setupJoystick();
                this.setupButtons();
                this.setupToggle();
                this.setupShowButton();
                this.setupUserInteractionDetection();
                this.updateControlsVisibility();
            }

            setActiveButtons(buttonList) {
                this.activeButtons = buttonList;
                // Only update visibility if controls are currently visible
                if (this.controlsVisible) {
                    this.updateButtonVisibility();
                }
            }

            updateButtonVisibility() {
                const allButtons = ['b1', 'b2', 'b3', 'b4', 'b5', 'b6', 'start', 'pause'];

                allButtons.forEach(btn => {
                    const element = document.getElementById(`btn-${btn}`);
                    if (element) {
                        // Start and Pause buttons are always shown when controls are visible
                        if (this.controlsVisible && (this.activeButtons.includes(btn) || btn === 'start' || btn === 'pause')) {
                            element.classList.remove('controls-hidden');
                            element.style.display = 'flex';
                        } else {
                            element.classList.add('controls-hidden');
                            element.style.display = 'none';
                        }
                    }
                });
            }

            setupJoystick() {
                const joyArea = document.getElementById('joy-area');
                const canvas = document.createElement('canvas');
                canvas.width = joyArea.clientWidth;
                canvas.height = joyArea.clientHeight;
                canvas.style.width = '100%';
                canvas.style.height = '100%';
                canvas.style.touchAction = 'none';
                joyArea.appendChild(canvas);

                const ctx = canvas.getContext('2d');
                this.joyCanvas = canvas;
                this.joyCtx = ctx;

                this.drawJoystick();

                let activePointerId = null;
                joyArea.addEventListener('pointerdown', (ev) => {
                    ev.preventDefault();
                    joyArea.setPointerCapture(ev.pointerId);
                    activePointerId = ev.pointerId;
                    this.joystickState.active = true;
                    const rect = canvas.getBoundingClientRect();
                    const cx = rect.width/2, cy = rect.height/2;
                    const x = ev.clientX - rect.left;
                    const y = ev.clientY - rect.top;
                    this.joystickState.dx = x - cx;
                    this.joystickState.dy = y - cy;
                    this.drawJoystick();
                });

                joyArea.addEventListener('pointermove', (ev) => {
                    if (ev.pointerId !== activePointerId) return;
                    ev.preventDefault();
                    const rect = canvas.getBoundingClientRect();
                    const cx = rect.width/2, cy = rect.height/2;
                    const x = ev.clientX - rect.left;
                    const y = ev.clientY - rect.top;
                    const dx = x - cx, dy = y - cy;
                    const maxR = Math.min(cx,cy)*0.75;
                    const mag = Math.sqrt(dx*dx + dy*dy);
                    let nx = dx, ny = dy;
                    if (mag > maxR) {
                        nx = dx / mag * maxR;
                        ny = dy / mag * maxR;
                    }
                    this.joystickState.dx = nx;
                    this.joystickState.dy = ny;
                    this.drawJoystick();
                });

                joyArea.addEventListener('pointerup', (ev) => {
                    if (ev.pointerId !== activePointerId) return;
                    this.joystickState.active = false;
                    this.joystickState.dx = 0;
                    this.joystickState.dy = 0;
                    activePointerId = null;
                    try { joyArea.releasePointerCapture(ev.pointerId); } catch(e){}
                    this.drawJoystick();
                });

                joyArea.addEventListener('pointercancel', (ev) => {
                    this.joystickState.active = false;
                    this.joystickState.dx = 0;
                    this.joystickState.dy = 0;
                    activePointerId = null;
                    this.drawJoystick();
                });

                // Resize observer for responsive joystick
                const resizeObserver = new ResizeObserver(() => {
                    canvas.width = joyArea.clientWidth * devicePixelRatio;
                    canvas.height = joyArea.clientHeight * devicePixelRatio;
                    canvas.style.width = '100%';
                    canvas.style.height = '100%';
                    ctx.setTransform(devicePixelRatio, 0, 0, devicePixelRatio, 0, 0);
                    this.drawJoystick();
                });
                resizeObserver.observe(joyArea);
            }

            drawJoystick() {
                if (!this.joyCtx || !this.joyCanvas) return;
                const ctx = this.joyCtx;
                const canvas = this.joyCanvas;
                ctx.clearRect(0,0,canvas.width,canvas.height);
                const cx = canvas.width/2, cy = canvas.height/2;
                // base circle
                ctx.globalAlpha = 0.18; ctx.fillStyle = '#ffffff';
                ctx.beginPath(); ctx.arc(cx, cy, Math.min(cx,cy)*0.9, 0, Math.PI*2); ctx.fill();
                // knob
                const knobX = cx + (this.joystickState.dx || 0);
                const knobY = cy + (this.joystickState.dy || 0);
                ctx.globalAlpha = 0.95; ctx.fillStyle = '#00aaff';
                ctx.beginPath(); ctx.arc(knobX, knobY, Math.min(cx,cy)*0.28, 0, Math.PI*2); ctx.fill();
                ctx.globalAlpha = 1.0;
            }

            setupButtons() {
                const buttonIds = ['b1', 'b2', 'b3', 'b4', 'b5', 'b6', 'start', 'pause'];
                buttonIds.forEach(btnId => {
                    const button = document.getElementById(`btn-${btnId}`);
                    if (button) {
                        this.addPressHandlers(button,
                            () => { this.buttonStates[btnId] = true; },
                            () => { this.buttonStates[btnId] = false; }
                        );
                    }
                });
            }

            setupToggle() {
                const toggleBtn = document.getElementById('btn-toggle-controls');
                if (toggleBtn) {
                    toggleBtn.addEventListener('click', () => {
                        this.controlsVisible = !this.controlsVisible;
                        this.updateControlsVisibility();
                    });
                }
            }

            setupShowButton() {
                const showBtn = document.getElementById('btn-show-controls');
                if (showBtn) {
                    showBtn.addEventListener('click', (e) => {
                        e.stopPropagation();
                        this.controlsVisible = !this.controlsVisible;
                        if (!this.controlsVisible) {
                            this.hideShowButton();
                        }
                        this.updateControlsVisibility();
                    });

                    showBtn.addEventListener('touchstart', (e) => {
                        e.stopPropagation();
                        showBtn.click();
                    });
                }
            }

            setupUserInteractionDetection() {
                const showShowButton = (e) => {
                    // Ignore clicks on mobile control buttons themselves
                    if (e && e.target && (
                        e.target.id === 'btn-show-controls' ||
                        e.target.classList.contains('control-button') ||
                        e.target.closest('#joy-area')
                    )) {
                        return;
                    }
                    if (!this.controlsVisible) {
                        this.showShowButton();
                    }
                };

                document.addEventListener('click', showShowButton);
                document.addEventListener('touchstart', showShowButton);

                document.addEventListener('keydown', (event) => {
                    if ((event.key === 'Enter' || event.code === 'Enter') && !this.controlsVisible) {
                        showShowButton();
                    }
                });

                // Start and Pause buttons should not interfere with controls visibility
                // They should only be used when controls are visible
            }

            showShowButton() {
                this.showButtonVisible = true;
                const showBtn = document.getElementById('btn-show-controls');
                if (showBtn) {
                    showBtn.style.opacity = '1';
                }

                // Clear existing timer
                if (this.showButtonTimer) {
                    clearTimeout(this.showButtonTimer);
                }

                if (!this.controlsVisible) {
                    this.showButtonTimer = setTimeout(() => {
                        this.hideShowButton();
                    }, 4000);
                }
            }

            hideShowButton() {
                this.showButtonVisible = false;
                const showBtn = document.getElementById('btn-show-controls');
                if (showBtn) {
                    showBtn.style.opacity = '0';
                }

                if (this.showButtonTimer) {
                    clearTimeout(this.showButtonTimer);
                    this.showButtonTimer = null;
                }
            }

            addPressHandlers(el, onDown, onUp) {
                el.addEventListener('pointerdown', (ev) => { ev.preventDefault(); onDown(); });
                window.addEventListener('pointerup', (ev) => { onUp(); });
                el.addEventListener('pointercancel', (ev) => { onUp(); });
                el.addEventListener('lostpointercapture', (ev) => { onUp(); });
            }

            updateControlsVisibility() {
                const toggle = document.getElementById('btn-toggle-controls');
                const showBtn = document.getElementById('btn-show-controls');
                const joyArea = document.getElementById('joy-area');

                if (joyArea) {
                    if (this.controlsVisible) {
                        joyArea.classList.remove('controls-hidden');
                        joyArea.style.display = 'block';
                    } else {
                        joyArea.classList.add('controls-hidden');
                        joyArea.style.display = 'none';
                    }
                }

                const allButtons = ['b1', 'b2', 'b3', 'b4', 'b5', 'b6', 'start', 'pause'];
                allButtons.forEach(btnName => {
                    const element = document.getElementById(`btn-${btnName}`);
                    if (element && element !== toggle && element !== showBtn) {
                        if (this.controlsVisible) {
                            element.classList.remove('controls-hidden');
                            element.style.display = 'flex';
                        } else {
                            element.classList.add('controls-hidden');
                            element.style.display = 'none';
                        }
                    }
                });

                if (toggle) {
                    toggle.style.opacity = this.controlsVisible ? '1' : '0.5';
                }

                if (this.controlsVisible) {
                    this.updateButtonVisibility();
                }

                if (this.controlsVisible && showBtn) {
                    if (!this.showButtonVisible) {
                        this.showShowButton();
                    }
                    showBtn.innerHTML = '✕';
                    showBtn.style.background = 'rgba(255,0,0,0.7)';
                } else if (showBtn) {
                    showBtn.innerHTML = '🎮';
                    showBtn.style.background = 'rgba(0,0,0,0.7)';
                }
            }

            getButtonState(button) {
                return this.buttonStates[button] || false;
            }

            getJoystickState() {
                return { ...this.joystickState };
            }
        }

        // Global mobile controls instance
        window.mobileControls = new MobileControlsManager();

        // Hide loading screen once game starts
        window.addEventListener('load', () => {
            setTimeout(() => {
                const loading = document.getElementById('loading');
                if (loading) {
                    loading.classList.add('hidden');
                }
            }, 2000);
        });

        // Simple error handling
        window.addEventListener('error', (event) => {
            console.error('Game error:', event.error);
            const loading = document.getElementById('loading');
            if (loading) {
                loading.innerHTML = '<h2>Error Loading Game</h2><p>Check console for details</p>';
            }
        });
    </script>
</body>
</html>
